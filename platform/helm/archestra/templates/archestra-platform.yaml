{{/*
Validation: Ensure postgresql.enabled=false when using external database
*/}}
{{- if and .Values.postgresql.external_database_url .Values.postgresql.enabled (ne (toString .Values.postgresql.external_database_url) "from_vault") }}
{{- fail "Configuration error: When postgresql.external_database_url is set, you must also set postgresql.enabled=false to prevent deploying an unused PostgreSQL instance." }}
{{- end }}
{{/*
Validation: Ensure diagnostics storage supports concurrent pod mounts
*/}}
{{- $usesChartManagedDiagnosticsClaim := and .Values.archestra.diagnostics.enabled (not .Values.archestra.diagnostics.existingClaimName) }}
{{- $diagnosticsAccessModes := .Values.archestra.diagnostics.accessModes | default (list) }}
{{- $supportsConcurrentDiagnosticsMounts := has "ReadWriteMany" $diagnosticsAccessModes }}
{{- $webReplicas := int .Values.archestra.replicaCount }}
{{- if .Values.archestra.horizontalPodAutoscaler.enabled }}
{{- $webReplicas = int .Values.archestra.horizontalPodAutoscaler.minReplicas }}
{{- end }}
{{- $workerReplicas := 0 }}
{{- if .Values.archestra.worker.enabled }}
{{- $workerReplicas = int .Values.archestra.worker.replicaCount }}
{{- end }}
{{- $totalDiagnosticsPods := add $webReplicas $workerReplicas }}
{{- $webMaxSurge := "0" }}
{{- if and .Values.archestra.deploymentStrategy (eq (.Values.archestra.deploymentStrategy.type | default "RollingUpdate") "RollingUpdate") .Values.archestra.deploymentStrategy.rollingUpdate }}
{{- $webMaxSurge = toString (.Values.archestra.deploymentStrategy.rollingUpdate.maxSurge | default 0) }}
{{- end }}
{{- $workerMaxSurge := "0" }}
{{- if and .Values.archestra.worker.enabled .Values.archestra.worker.deploymentStrategy (eq (.Values.archestra.worker.deploymentStrategy.type | default "RollingUpdate") "RollingUpdate") .Values.archestra.worker.deploymentStrategy.rollingUpdate }}
{{- $workerMaxSurge = toString (.Values.archestra.worker.deploymentStrategy.rollingUpdate.maxSurge | default 0) }}
{{- end }}
{{- $rolloutCanOverlapDiagnosticsPods := or (and (gt $webReplicas 0) (ne $webMaxSurge "0") (ne $webMaxSurge "0%")) (and (gt $workerReplicas 0) (ne $workerMaxSurge "0") (ne $workerMaxSurge "0%")) }}
{{- if and $usesChartManagedDiagnosticsClaim (not $supportsConcurrentDiagnosticsMounts) (or (gt $totalDiagnosticsPods 1) $rolloutCanOverlapDiagnosticsPods) }}
{{- fail "Configuration error: archestra.diagnostics.enabled with a chart-managed claim requires ReadWriteMany access when more than one diagnostics-writing pod can run concurrently. Use archestra.diagnostics.accessModes=[ReadWriteMany] with a compatible storage class, or disable diagnostics for multi-pod/shared-rollout environments." }}
{{- end }}
{{/*
Validation: Ensure filesystem file storage supports concurrent pod mounts
*/}}
{{- $usesChartManagedFileStorageClaim := and (eq .Values.archestra.fileStorage.provider "filesystem") (not .Values.archestra.fileStorage.filesystem.existingClaim) }}
{{- $fileStorageAccessModes := .Values.archestra.fileStorage.filesystem.accessModes | default (list) }}
{{- $supportsConcurrentFileStorageMounts := has "ReadWriteMany" $fileStorageAccessModes }}
{{- if and $usesChartManagedFileStorageClaim (not $supportsConcurrentFileStorageMounts) (or (gt $totalDiagnosticsPods 1) $rolloutCanOverlapDiagnosticsPods) }}
{{- fail "Configuration error: archestra.fileStorage.provider=filesystem with a chart-managed claim requires ReadWriteMany access when more than one file-storage-writing pod can run concurrently. Use archestra.fileStorage.filesystem.accessModes=[ReadWriteMany] with a compatible storage class, or run a single replica (and no surge/worker) for filesystem storage." }}
{{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "archestra-platform.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "archestra-platform.labels" . | nindent 4 }}
  {{- with .Values.archestra.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.archestra.service.type | default "ClusterIP" }}
  ports:
    - port: 9000
      targetPort: backend
      protocol: TCP
      name: backend
      {{- if and (eq (.Values.archestra.service.type | default "ClusterIP") "NodePort") .Values.archestra.service.nodePorts.backend }}
      nodePort: {{ .Values.archestra.service.nodePorts.backend }}
      {{- end }}
    - port: 9050
      targetPort: metrics
      protocol: TCP
      name: metrics
      {{- if and (eq (.Values.archestra.service.type | default "ClusterIP") "NodePort") .Values.archestra.service.nodePorts.metrics }}
      nodePort: {{ .Values.archestra.service.nodePorts.metrics }}
      {{- end }}
    - port: 3000
      targetPort: frontend
      protocol: TCP
      name: frontend
      {{- if and (eq (.Values.archestra.service.type | default "ClusterIP") "NodePort") .Values.archestra.service.nodePorts.frontend }}
      nodePort: {{ .Values.archestra.service.nodePorts.frontend }}
      {{- end }}
  selector:
    {{- include "archestra-platform.selectorLabels" . | nindent 4 }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "archestra-platform.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "archestra-platform.labels" . | nindent 4 }}
spec:
  {{- if not .Values.archestra.horizontalPodAutoscaler.enabled }}
  replicas: {{ .Values.archestra.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "archestra-platform.selectorLabels" . | nindent 6 }}
  {{- with .Values.archestra.deploymentStrategy }}
  strategy:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  template:
    metadata:
      labels:
        {{- include "archestra-platform.labels" . | nindent 8 }}
        app.kubernetes.io/component: web
        {{- with .Values.archestra.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.archestra.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "archestra-platform.serviceAccountName" . }}
      {{- if ne (include "archestra-platform.maintenanceModeEnabled" .) "true" }}
      initContainers:
        {{- include "archestra-platform.initContainers" . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          image: {{ include "archestra-platform.image" . }}
          imagePullPolicy: {{ .Values.archestra.imagePullPolicy | default "IfNotPresent" }}
          {{- if .Values.archestra.initContainers.vaultSecrets.enabled }}
          {{- include "archestra-platform.vaultSecretsCommand" (.Values.archestra.initContainers.vaultSecrets.entrypoint | default "/docker-entrypoint.sh") | nindent 10 }}
          {{- end }}
          ports:
            - name: backend
              containerPort: 9000
              protocol: TCP
            - name: metrics
              containerPort: 9050
              protocol: TCP
            - name: frontend
              containerPort: 3000
              protocol: TCP
          env:
            {{- include "archestra-platform.env" . | nindent 12 }}
            {{- if .Values.archestra.worker.enabled }}
            - name: ARCHESTRA_PROCESS_TYPE
              value: "web"
            {{- end }}
          {{- with .Values.archestra.envFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.archestra.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          # Startup probe - gives the application time to start up
          startupProbe:
            httpGet:
              path: /health
              port: backend
            initialDelaySeconds: {{ .Values.archestra.probes.startup.initialDelaySeconds }}
            periodSeconds: {{ .Values.archestra.probes.startup.periodSeconds }}
            timeoutSeconds: {{ .Values.archestra.probes.startup.timeoutSeconds }}
            failureThreshold: {{ .Values.archestra.probes.startup.failureThreshold }}
          # Liveness probe - restarts the container if it becomes unresponsive
          livenessProbe:
            httpGet:
              path: /health
              port: backend
            periodSeconds: {{ .Values.archestra.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.archestra.probes.liveness.timeoutSeconds }}
            failureThreshold: {{ .Values.archestra.probes.liveness.failureThreshold }}
          # Readiness probe - marks the container as ready to receive traffic
          # Uses /ready endpoint which checks database connectivity
          readinessProbe:
            httpGet:
              path: /ready
              port: backend
            periodSeconds: {{ .Values.archestra.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.archestra.probes.readiness.timeoutSeconds }}
            failureThreshold: {{ .Values.archestra.probes.readiness.failureThreshold }}
          {{- include "archestra-platform.volumeMounts" . | nindent 10 }}
      {{- with .Values.archestra.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.archestra.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- include "archestra-platform.volumes" . | nindent 6 }}
