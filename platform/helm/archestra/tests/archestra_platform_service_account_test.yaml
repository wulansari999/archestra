suite: test archestra platform -- ServiceAccount/Role/RoleBinding
templates:
  - serviceaccount.yaml
tests:
  # ServiceAccount tests
  - it: should create a ServiceAccount by default
    documentIndex: 0
    asserts:
      - isKind:
          of: ServiceAccount
      - matchRegex:
          path: metadata.name
          pattern: -archestra-platform$

  - it: should not create ServiceAccount when create is false
    set:
      archestra.orchestrator.kubernetes.serviceAccount.create: false
    asserts:
      - hasDocuments:
          count: 2  # MCP Role + MCP RoleBinding

  - it: should use custom ServiceAccount name when provided
    set:
      archestra.orchestrator.kubernetes.serviceAccount.name: "custom-sa-name"
    documentIndex: 0
    asserts:
      - equal:
          path: metadata.name
          value: "custom-sa-name"

  - it: should add custom annotations to ServiceAccount
    set:
      archestra.orchestrator.kubernetes.serviceAccount.annotations:
        eks.amazonaws.com/role-arn: "arn:aws:iam::123456789012:role/my-role"
        custom-annotation: "custom-value"
    documentIndex: 0
    asserts:
      - equal:
          path: metadata.annotations["eks.amazonaws.com/role-arn"]
          value: "arn:aws:iam::123456789012:role/my-role"
      - equal:
          path: metadata.annotations["custom-annotation"]
          value: "custom-value"

  - it: should not have imagePullSecrets when not configured
    documentIndex: 0
    asserts:
      - isNull:
          path: imagePullSecrets

  - it: should add imagePullSecrets to ServiceAccount when configured
    set:
      archestra.orchestrator.kubernetes.serviceAccount.imagePullSecrets:
        - name: myregistrykey
        - name: anotherregistrykey
    documentIndex: 0
    asserts:
      - equal:
          path: imagePullSecrets[0].name
          value: myregistrykey
      - equal:
          path: imagePullSecrets[1].name
          value: anotherregistrykey

  # MCP Manager Role tests
  - it: should create a MCP Manager Role by default
    documentIndex: 1
    asserts:
      - isKind:
          of: Role
      - matchRegex:
          path: metadata.name
          pattern: -archestra-platform-mcp-manager$

  - it: should not create Role when rbac.create is false
    set:
      archestra.orchestrator.kubernetes.rbac.create: false
    asserts:
      - hasDocuments:
          count: 1  # Only ServiceAccount should be created

  - it: should have correct pod permissions in MCP Manager Role
    documentIndex: 1
    asserts:
      - contains:
          path: rules
          content:
            apiGroups: [""]
            resources: ["pods"]
            verbs: ["get", "list", "create", "update", "patch", "delete", "watch"]

  - it: should have pod/exec permissions in MCP Manager Role
    documentIndex: 1
    asserts:
      - contains:
          path: rules
          content:
            apiGroups: [""]
            resources: ["pods/exec"]
            verbs: ["get", "create"]

  - it: should have pod/log permissions in MCP Manager Role
    documentIndex: 1
    asserts:
      - contains:
          path: rules
          content:
            apiGroups: [""]
            resources: ["pods/log"]
            verbs: ["get", "list"]

  - it: should have pod/attach permissions in MCP Manager Role
    documentIndex: 1
    asserts:
      - contains:
          path: rules
          content:
            apiGroups: [""]
            resources: ["pods/attach"]
            verbs: ["get", "create"]

  - it: should have services permissions in MCP Manager Role
    documentIndex: 1
    asserts:
      - contains:
          path: rules
          content:
            apiGroups: [""]
            resources: ["services"]
            verbs: ["get", "list", "create", "update", "patch", "delete", "watch"]

  - it: should have secrets permissions in MCP Manager Role
    documentIndex: 1
    asserts:
      - contains:
          path: rules
          content:
            apiGroups: [""]
            resources: ["secrets"]
            verbs: ["get", "list", "create", "update", "patch", "delete", "watch"]

  - it: should have configmaps permissions in MCP Manager Role
    documentIndex: 1
    asserts:
      - contains:
          path: rules
          content:
            apiGroups: [""]
            resources: ["configmaps"]
            verbs: ["get", "list", "create", "update", "patch", "delete", "watch"]

  - it: should have deployments + statefulsets permissions in MCP Manager Role
    documentIndex: 1
    asserts:
      - contains:
          path: rules
          content:
            apiGroups: ["apps"]
            resources: ["deployments", "statefulsets"]
            verbs: ["get", "list", "create", "update", "patch", "delete", "watch"]

  - it: should have network policy permissions in MCP Manager Role
    documentIndex: 1
    asserts:
      - contains:
          path: rules
          content:
            apiGroups: ["networking.k8s.io"]
            resources: ["networkpolicies"]
            verbs: ["get", "list", "create", "update", "patch", "delete", "watch"]
      - contains:
          path: rules
          content:
            apiGroups: ["cilium.io"]
            resources: ["ciliumnetworkpolicies"]
            verbs: ["get", "list", "create", "update", "patch", "delete", "watch"]
      - contains:
          path: rules
          content:
            apiGroups: ["networking.gke.io"]
            resources: ["fqdnnetworkpolicies"]
            verbs: ["get", "list", "create", "update", "patch", "delete", "watch"]
      - contains:
          path: rules
          content:
            apiGroups: ["networking.k8s.aws"]
            resources: ["applicationnetworkpolicies"]
            verbs: ["get", "list", "create", "update", "patch", "delete", "watch"]

  - it: should NOT have batch/cronjobs permissions in MCP Manager Role
    documentIndex: 1
    asserts:
      - notContains:
          path: rules
          content:
            apiGroups: ["batch"]
            resources: ["cronjobs", "jobs"]
            verbs: ["get", "list", "create", "update", "patch", "delete", "watch"]

  # MCP Manager RoleBinding tests
  - it: should create a MCP Manager RoleBinding by default
    documentIndex: 2
    asserts:
      - isKind:
          of: RoleBinding
      - matchRegex:
          path: metadata.name
          pattern: -archestra-platform-mcp-manager$

  - it: should not create MCP Manager RoleBinding when rbac.create is false
    set:
      archestra.orchestrator.kubernetes.rbac.create: false
    asserts:
      - hasDocuments:
          count: 1  # Only ServiceAccount should be created

  - it: MCP Manager RoleBinding should bind to the correct ServiceAccount
    documentIndex: 2
    asserts:
      - equal:
          path: subjects[0].kind
          value: ServiceAccount
      - matchRegex:
          path: subjects[0].name
          pattern: -archestra-platform$
      - equal:
          path: subjects[0].namespace
          value: NAMESPACE

  - it: MCP Manager RoleBinding should bind to custom ServiceAccount name
    set:
      archestra.orchestrator.kubernetes.serviceAccount.name: "custom-sa-name"
    documentIndex: 2
    asserts:
      - equal:
          path: subjects[0].name
          value: "custom-sa-name"

  - it: MCP Manager RoleBinding should reference the correct Role
    documentIndex: 2
    asserts:
      - equal:
          path: roleRef.kind
          value: Role
      - matchRegex:
          path: roleRef.name
          pattern: -archestra-platform-mcp-manager$
      - equal:
          path: roleRef.apiGroup
          value: rbac.authorization.k8s.io

  # Integration tests
  - it: should create all resources with default values
    asserts:
      - hasDocuments:
          count: 3

  - it: should create only ServiceAccount when RBAC is disabled
    set:
      archestra.orchestrator.kubernetes.rbac.create: false
    asserts:
      - hasDocuments:
          count: 1

  - it: should create only RBAC resources when ServiceAccount is disabled
    set:
      archestra.orchestrator.kubernetes.serviceAccount.create: false
    asserts:
      - hasDocuments:
          count: 2

  - it: should create no resources when both are disabled
    set:
      archestra.orchestrator.kubernetes.serviceAccount.create: false
      archestra.orchestrator.kubernetes.rbac.create: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should work with all custom configurations
    set:
      archestra.orchestrator.kubernetes.serviceAccount.name: "custom-archestra-sa"
      archestra.orchestrator.kubernetes.serviceAccount.annotations:
        eks.amazonaws.com/role-arn: "arn:aws:iam::123456789012:role/archestra-role"
      archestra.orchestrator.kubernetes.serviceAccount.imagePullSecrets:
        - name: private-registry-secret
    documentIndex: 0
    asserts:
      - equal:
          path: metadata.name
          value: "custom-archestra-sa"
      - equal:
          path: metadata.annotations["eks.amazonaws.com/role-arn"]
          value: "arn:aws:iam::123456789012:role/archestra-role"
      - equal:
          path: imagePullSecrets[0].name
          value: private-registry-secret

  - it: should ensure MCP Manager RoleBinding references custom ServiceAccount
    set:
      archestra.orchestrator.kubernetes.serviceAccount.name: "custom-archestra-sa"
    documentIndex: 2
    asserts:
      - equal:
          path: subjects[0].name
          value: "custom-archestra-sa"

  # environmentNamespaces tests
  # Default rendering is 3 docs (SA, Role, RoleBinding). Each additional namespace
  # appends a Role then a RoleBinding, so [staging, prod-ns] => indexes 3..6.
  - it: should not create extra RBAC for environmentNamespaces by default
    asserts:
      - hasDocuments:
          count: 3

  - it: should create a Role and RoleBinding per additional namespace
    set:
      archestra.orchestrator.kubernetes.rbac.environmentNamespaces:
        - staging
        - prod-ns
    asserts:
      - hasDocuments:
          count: 7  # SA + release Role/RoleBinding + 2 namespaces * (Role + RoleBinding)

  - it: additional namespace Role targets that namespace
    set:
      archestra.orchestrator.kubernetes.rbac.environmentNamespaces:
        - staging
        - prod-ns
    documentIndex: 3
    asserts:
      - isKind:
          of: Role
      - equal:
          path: metadata.namespace
          value: staging
      - matchRegex:
          path: metadata.name
          pattern: -archestra-platform-mcp-manager$

  - it: additional namespace RoleBinding targets that namespace and binds the release-namespace SA
    set:
      archestra.orchestrator.kubernetes.rbac.environmentNamespaces:
        - staging
        - prod-ns
    documentIndex: 4
    asserts:
      - isKind:
          of: RoleBinding
      - equal:
          path: metadata.namespace
          value: staging
      - equal:
          path: subjects[0].kind
          value: ServiceAccount
      - matchRegex:
          path: subjects[0].name
          pattern: -archestra-platform$
      # Subject SA lives in the release namespace, not the target namespace.
      - equal:
          path: subjects[0].namespace
          value: NAMESPACE
      - equal:
          path: roleRef.kind
          value: Role
      - matchRegex:
          path: roleRef.name
          pattern: -archestra-platform-mcp-manager$

  - it: second additional namespace also renders Role and RoleBinding
    set:
      archestra.orchestrator.kubernetes.rbac.environmentNamespaces:
        - staging
        - prod-ns
    documentIndex: 5
    asserts:
      - isKind:
          of: Role
      - equal:
          path: metadata.namespace
          value: prod-ns

  - it: additional namespace Role grants the same MCP-manager rules (no drift)
    set:
      archestra.orchestrator.kubernetes.rbac.environmentNamespaces:
        - staging
    documentIndex: 3
    asserts:
      - contains:
          path: rules
          content:
            apiGroups: ["apps"]
            resources: ["deployments", "statefulsets"]
            verbs: ["get", "list", "create", "update", "patch", "delete", "watch"]
      - contains:
          path: rules
          content:
            apiGroups: ["networking.k8s.io"]
            resources: ["networkpolicies"]
            verbs: ["get", "list", "create", "update", "patch", "delete", "watch"]
      - contains:
          path: rules
          content:
            apiGroups: ["cilium.io"]
            resources: ["ciliumnetworkpolicies"]
            verbs: ["get", "list", "create", "update", "patch", "delete", "watch"]
      - contains:
          path: rules
          content:
            apiGroups: ["networking.gke.io"]
            resources: ["fqdnnetworkpolicies"]
            verbs: ["get", "list", "create", "update", "patch", "delete", "watch"]
      - contains:
          path: rules
          content:
            apiGroups: ["networking.k8s.aws"]
            resources: ["applicationnetworkpolicies"]
            verbs: ["get", "list", "create", "update", "patch", "delete", "watch"]
      - contains:
          path: rules
          content:
            apiGroups: [""]
            resources: ["secrets"]
            verbs: ["get", "list", "create", "update", "patch", "delete", "watch"]

  - it: should not create additional-namespace RBAC when rbac.create is false
    set:
      archestra.orchestrator.kubernetes.rbac.create: false
      archestra.orchestrator.kubernetes.rbac.environmentNamespaces:
        - staging
        - prod-ns
    asserts:
      - hasDocuments:
          count: 1  # Only the ServiceAccount

  - it: should skip an additional namespace equal to the release namespace
    set:
      archestra.orchestrator.kubernetes.rbac.environmentNamespaces:
        - NAMESPACE
    asserts:
      - hasDocuments:
          count: 3  # No duplicate Role/RoleBinding for the release namespace

  - it: should skip only the release namespace from a mixed list
    set:
      archestra.orchestrator.kubernetes.rbac.environmentNamespaces:
        - NAMESPACE
        - staging
    asserts:
      - hasDocuments:
          count: 5  # SA + release Role/RoleBinding + staging Role/RoleBinding

  - it: additional namespace RoleBinding honors a custom ServiceAccount name
    set:
      archestra.orchestrator.kubernetes.serviceAccount.name: "custom-sa-name"
      archestra.orchestrator.kubernetes.rbac.environmentNamespaces:
        - staging
    documentIndex: 4
    asserts:
      - equal:
          path: subjects[0].name
          value: "custom-sa-name"
