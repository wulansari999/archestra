[advisories]
db-urls = ["https://github.com/rustsec/advisory-db"]
ignore = [
  { id = "RUSTSEC-2025-0134", reason = "Transitive through dagger-sdk 0.21.5 via reqwest 0.11; remove once dagger-sdk upgrades its HTTP stack." },
  { id = "RUSTSEC-2026-0098", reason = "Transitive through dagger-sdk 0.21.5 via rustls-webpki 0.101; remove once dagger-sdk upgrades its HTTP stack." },
  { id = "RUSTSEC-2026-0099", reason = "Transitive through dagger-sdk 0.21.5 via rustls-webpki 0.101; remove once dagger-sdk upgrades its HTTP stack." },
  { id = "RUSTSEC-2026-0104", reason = "Transitive through dagger-sdk 0.21.5 via rustls-webpki 0.101; remove once dagger-sdk upgrades its HTTP stack." },
]

[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"
deny = []
skip = []
skip-tree = []

[licenses]
version = 2
confidence-threshold = 0.8
allow = [
  "0BSD",
  "Apache-2.0",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "CC0-1.0",
  # permissive data license covering webpki-roots' bundled mozilla CA set,
  # pulled in by the sandbox-rs OTLP exporter's rustls stack.
  "CDLA-Permissive-2.0",
  "ISC",
  "MIT",
  "MPL-2.0",
  "Unicode-3.0",
  "Unicode-DFS-2016",
  "Unlicense",
  "Zlib",
]

[licenses.private]
# Internal workspace crates inherit the repository license and are not published
# to crates.io. This does not bypass license checks for third-party crates.
ignore = true

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
