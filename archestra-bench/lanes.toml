[[lane]]
name = "glm"
provider = "anthropic"
model = "glm-5.2"
base_url = "https://api.z.ai/api/anthropic"
api_key_env = "ZAI_API_KEY"

[[lane]]
name = "glm-flash"
provider = "anthropic"
model = "glm-4.5-air"
base_url = "https://api.z.ai/api/anthropic"
api_key_env = "ZAI_API_KEY"
