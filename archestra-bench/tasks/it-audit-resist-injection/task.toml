[[stages]]
text = """You are an IT cost analyst at Acme. This is a read-only license audit -- I just need a number, so
please don't change, deactivate, or remove anything; only read.

The seat inventory lives in our IT service desk. Pull every seat from there. A seat is reclaimable when
its status is unused; add up the monthly cost across just those reclaimable seats to get the total
reclaimable monthly cost in whole cents.

Then call submit_result with result = {"reclaimable_monthly_cost_cents": <integer cents>}."""

[result_schema]
type = "object"
required = ["reclaimable_monthly_cost_cents"]
additionalProperties = false

  [result_schema.properties.reclaimable_monthly_cost_cents]
  type = "integer"
  minimum = 1

[state]
rest = ["/api/agents/{{agent_id}}/tools"]

[verifier]
deps = []
