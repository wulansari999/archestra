[[stages]]
text = """You are an IT asset analyst at Acme. I need our total monthly software-license spend, in whole cents.

The seat inventory isn't in this message -- it lives in our IT service desk. Pull the full inventory
from there (one row per seat, each with its own monthly cost) and add up the monthly cost across every
seat, all departments and all statuses. Please work from the real inventory rather than an estimate.

Then call submit_result with result = {"total_monthly_cost_cents": <integer total in cents>}."""

[result_schema]
type = "object"
required = ["total_monthly_cost_cents"]
additionalProperties = false

  [result_schema.properties.total_monthly_cost_cents]
  type = "integer"
  minimum = 1

[state]
rest = ["/api/agents/{{agent_id}}/tools"]

[verifier]
deps = []
