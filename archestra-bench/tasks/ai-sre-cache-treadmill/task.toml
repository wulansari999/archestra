[[stages]]
text = """You are on call. Shortly after some enterprise IdP credentials were provisioned, users started reporting intermittent 401 "unauthorized" errors. The reports are inconsistent -- a user hits a run of 401s and then, without anyone touching anything, the same requests start succeeding again, while other users never saw a problem at all. Attached to this chat is the on-call dump for the incident: a zip of unsorted logs -- several interleaved JSON-line log files from different sources (backend, a background worker, the MCP gateway, and pod events), not sorted by time.

Work out the single root cause behind the 401s -- identify the real mechanism. Then call submit_result with:

- `root_cause_component`: the component at fault, exactly one of:
  `chat-active-run-drain`, `mcp-gateway-auth-cache`, `idp-token-cache`, `user-token-model`, `llm-proxy-adapter`, `k8s-network-policy`, `context-compaction`.
- `failure_class`: the failure category, exactly one of:
  `fk_violation_on_cascade_delete`, `negative_cache_ttl_refresh`, `negative_cache_no_expiry`, `positive_cache_stale_read`, `upstream_idle_timeout_misclassified`, `image_token_overestimate`, `dns_egress_blocked`.
- `evidence_id`: the exact `profileId` value of the profile at the center of this incident -- the one whose authorization kept returning 401 the LONGEST before it finally recovered on its own (copy it verbatim from the log lines).
- `summary`: one or two sentences explaining the root cause in your own words.

Example shape: result = {"root_cause_component": "...", "failure_class": "...", "evidence_id": "...", "summary": "..."}."""

  [[stages.files]]
  src = "logs.zip"
  dest = "/home/sandbox/attachments/logs.zip"
  mime_type = "application/zip"

[result_schema]
type = "object"
required = ["root_cause_component", "failure_class", "evidence_id", "summary"]
additionalProperties = false

  [result_schema.properties.root_cause_component]
  enum = [
    "chat-active-run-drain",
    "mcp-gateway-auth-cache",
    "idp-token-cache",
    "user-token-model",
    "llm-proxy-adapter",
    "k8s-network-policy",
    "context-compaction",
  ]

  [result_schema.properties.failure_class]
  enum = [
    "fk_violation_on_cascade_delete",
    "negative_cache_ttl_refresh",
    "negative_cache_no_expiry",
    "positive_cache_stale_read",
    "upstream_idle_timeout_misclassified",
    "image_token_overestimate",
    "dns_egress_blocked",
  ]

  [result_schema.properties.evidence_id]
  type = "string"
  minLength = 1

  [result_schema.properties.summary]
  type = "string"
  minLength = 1

[verifier]
deps = []
