name: Platform E2E Tests

# Runs automatically in merge queue as the required E2E gate.
# For PRs, add the "run-e2e" label to trigger the full E2E suite on demand.
# Remove and re-add the label to re-trigger after new commits.
# Merge-queue / label runs cover chromium only; firefox + webkit run nightly on
# the schedule trigger to keep the queue fast (those projects only carry the 8
# @firefox/@webkit-tagged tests).
on:
  workflow_dispatch:
  schedule:
    # Nightly full cross-browser run (includes firefox + webkit).
    - cron: "0 3 * * *"
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - labeled
  merge_group:

permissions: {}

concurrency:
  group: "platform-e2e-tests-${{ github.event.pull_request.number || github.event.merge_group.head_sha || github.ref }}"
  cancel-in-progress: true

env:
  PLATFORM_IMAGE_REGISTRY: europe-west1-docker.pkg.dev/friendly-path-465518-r6/archestra-public
  PLATFORM_IMAGE_NAME: platform
  MCP_SERVER_BASE_IMAGE_REGISTRY: europe-west1-docker.pkg.dev/friendly-path-465518-r6/archestra-public
  MCP_SERVER_BASE_IMAGE_NAME: mcp-server-base

jobs:
  # Required-check placeholders for ordinary PR updates. These let a single
  # ruleset require merge-queue-only checks without forcing the full E2E suite
  # to run on every PR push.
  platform-e2e-build-placeholder:
    name: Build ${{ matrix.name }} Image
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'pull_request' && (github.event.action != 'labeled' || github.event.label.name != 'run-e2e') }}
    strategy:
      fail-fast: false
      matrix:
        name: [Platform, MCP Server Base]
    steps:
      - name: Skip full image build on ordinary PR updates
        run: echo "Full E2E image builds run on merge queue or when the run-e2e label is added."

  # Build Docker images for e2e tests (platform and MCP server base).
  # Trusted PRs and merge queue runs push the platform image to Artifact Registry so
  # each E2E shard can pull layers directly instead of downloading a tarball artifact.
  # Fork PRs still fall back to artifacts because they do not receive OIDC-backed secrets.
  platform-e2e-build:
    name: Build ${{ matrix.name }} Image
    runs-on: ${{ matrix.runner }}
    if: ${{ github.event_name == 'workflow_dispatch' || github.event_name == 'schedule' || github.event_name == 'merge_group' || github.event.label.name == 'run-e2e' }}
    permissions:
      contents: read # Required to checkout the repository and build images for E2E jobs.
      id-token: write # Required for Workload Identity Federation when pushing trusted images.
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Platform
            runner: blacksmith-16vcpu-ubuntu-2404
            context: ./platform
            dockerfile: ""
            artifact-name: platform-docker-image
            tarball-name: platform-image.tar.gz
            local-tag-prefix: archestra-platform
            use-build-action: true
          - name: MCP Server Base
            runner: blacksmith-4vcpu-ubuntu-2404
            context: ./platform/mcp_server_docker_image
            dockerfile: ./platform/mcp_server_docker_image/Dockerfile
            artifact-name: mcp-server-base-docker-image
            tarball-name: mcp-server-base-image.tar.gz
            local-tag-prefix: mcp-server-base
            use-build-action: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Setup environment
        if: ${{ matrix.use-build-action }}
        uses: ./.github/actions/setup-env
        with:
          working-directory: ./platform

      - name: Build Platform image
        if: ${{ matrix.use-build-action && (github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == true) }}
        uses: ./.github/actions/build-docker-image
        with:
          context: ${{ matrix.context }}
          load: "true"
          tags: ${{ matrix.local-tag-prefix }}:${{ github.sha }}
          turbo-team: ${{ secrets.TURBOREPO_REMOTE_CACHING_TEAM }}
          turbo-token: ${{ secrets.TURBOREPO_REMOTE_CACHING_TOKEN }}

      - name: Authenticate to Google Artifact Registry
        if: ${{ matrix.use-build-action && !(github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == true) }}
        uses: ./.github/actions/auth-to-gar
        with:
          service_account: ${{ secrets.DEVELOPMENT_OAUTH_PROXY_RELEASER_GCP_SERVICE_ACCOUNT_NAME }}
          workload_identity_provider: ${{ secrets.DEVELOPMENT_OAUTH_PROXY_RELEASER_GCP_WORKLOAD_IDENTITY_PROVIDER_IDENTIFIER }}

      - name: Build Platform image and push to Artifact Registry
        if: ${{ matrix.use-build-action && !(github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == true) }}
        uses: ./.github/actions/build-docker-image
        with:
          context: ${{ matrix.context }}
          push: "true"
          tags: ${{ env.PLATFORM_IMAGE_REGISTRY }}/${{ env.PLATFORM_IMAGE_NAME }}:${{ github.sha }}
          turbo-team: ${{ secrets.TURBOREPO_REMOTE_CACHING_TEAM }}
          turbo-token: ${{ secrets.TURBOREPO_REMOTE_CACHING_TOKEN }}

      - name: Setup Blacksmith Builder
        if: ${{ !matrix.use-build-action }}
        uses: ./.github/actions/setup-blacksmith-builder

      - name: Authenticate to Google Artifact Registry
        if: ${{ !matrix.use-build-action && !(github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == true) }}
        uses: ./.github/actions/auth-to-gar
        with:
          service_account: ${{ secrets.DEVELOPMENT_OAUTH_PROXY_RELEASER_GCP_SERVICE_ACCOUNT_NAME }}
          workload_identity_provider: ${{ secrets.DEVELOPMENT_OAUTH_PROXY_RELEASER_GCP_WORKLOAD_IDENTITY_PROVIDER_IDENTIFIER }}

      - name: Build MCP server base image
        if: ${{ !matrix.use-build-action }}
        uses: ./.github/actions/blacksmith-build-push
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: ${{ !(github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == true) && 'true' || 'false' }}
          load: ${{ (github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == true) && 'true' || 'false' }}
          tags: ${{ !(github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == true) && format('{0}/{1}:{2}', env.MCP_SERVER_BASE_IMAGE_REGISTRY, env.MCP_SERVER_BASE_IMAGE_NAME, github.sha) || format('{0}:{1}', matrix.local-tag-prefix, github.sha) }}

      # Export as artifact for fast co-located downloads in E2E jobs
      - name: Export Docker image as tarball
        if: ${{ !matrix.use-build-action || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == true) }}
        env:
          GIT_SHA: ${{ github.sha }}
          LOCAL_TAG_PREFIX: ${{ matrix.local-tag-prefix }}
          TARBALL_NAME: ${{ matrix.tarball-name }}
        run: |
          docker save "${LOCAL_TAG_PREFIX}:${GIT_SHA}" | gzip > "/tmp/${TARBALL_NAME}"
          ls -lh "/tmp/${TARBALL_NAME}"

      - name: Upload Docker image artifact
        if: ${{ !matrix.use-build-action || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == true) }}
        uses: ./.github/actions/github-upload-artifact
        with:
          name: ${{ matrix.artifact-name }}
          path: /tmp/${{ matrix.tarball-name }}
          retention-days: 1
          compression-level: 0 # Already gzipped

  platform-e2e-tests-placeholder:
    name: Platform E2E Tests
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'pull_request' && (github.event.action != 'labeled' || github.event.label.name != 'run-e2e') }}
    steps:
      - name: Skip full non-quickstart E2E job on ordinary PR updates
        run: echo "Full non-quickstart E2E runs on merge queue or when the run-e2e label is added."

  # E2E tests - runs the generic non-quickstart suites plus the Vault K8s startup
  # coverage against one shared CI deployment in the standard DB secrets mode.
  # Quickstart remains separate because it validates the docker run path.
  platform-e2e-tests-shards:
    name: Platform E2E Tests Shard (${{ matrix.shard }}/2)
    needs: [platform-e2e-build]
    if: ${{ github.event_name == 'workflow_dispatch' || github.event_name == 'schedule' || github.event_name == 'merge_group' || github.event.label.name == 'run-e2e' }}
    runs-on: blacksmith-16vcpu-ubuntu-2404
    # Observed worst-case shard wall-clock is ~10 min (setup + tests); 30 caps a
    # hung run instead of letting it burn a 16vcpu runner for the GitHub default.
    timeout-minutes: 30
    strategy:
      # A failing shard must not cancel its siblings: a cancelled leg would
      # collapse the matrix result to "cancelled" and produce a partial report.
      fail-fast: false
      matrix:
        shard: [1, 2]
    permissions:
      contents: read # Required to checkout the repository and read test assets.
      id-token: write # Required for Workload Identity Federation in setup actions.
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Setup environment
        uses: ./.github/actions/setup-env
        with:
          working-directory: ./platform

      - name: Load platform image
        id: load-platform-image
        uses: ./.github/actions/load-platform-image
        with:
          source: ${{ (github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == true) && 'artifact' || 'registry' }}
          image-tag: ${{ (github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == true) && format('archestra-platform:{0}', github.sha) || format('{0}/{1}:{2}', env.PLATFORM_IMAGE_REGISTRY, env.PLATFORM_IMAGE_NAME, github.sha) }}

      - name: Load MCP server base image
        id: load-mcp-server-base-image
        uses: ./.github/actions/load-mcp-server-base-image
        with:
          source: ${{ (github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == true) && 'artifact' || 'registry' }}
          image-tag: ${{ (github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == true) && format('mcp-server-base:{0}', github.sha) || format('{0}/{1}:{2}', env.MCP_SERVER_BASE_IMAGE_REGISTRY, env.MCP_SERVER_BASE_IMAGE_NAME, github.sha) }}

      - name: Prepare blob report workspace
        run: |
          rm -rf platform/e2e-tests/blob-report platform/e2e-tests/blob-reports
          mkdir -p platform/e2e-tests/blob-reports

      - name: Setup Archestra Platform
        id: setup-platform
        uses: ./.github/actions/setup-archestra-platform
        with:
          kind-config-path: .github/kind.yaml
          kind-cluster-name: archestra-ci-cluster
          helm-values-path: .github/values-ci.yaml
          deploy-e2e-dependencies: "true"
          e2e-dependencies-install-mode: "foreground"
          e2e-dependencies-extra-helm-set: "vault.k8sAuth.enabled=true,vault.k8sAuth.boundServiceAccountName=archestra-platform,vault.k8sAuth.boundServiceAccountNamespace=default"
          e2e-dependencies-wait-for-vault: "true"
          build-platform-image: "false"
          platform-image-tag: ${{ steps.load-platform-image.outputs.image-tag }}
          platform-context: ./platform
          mcp-server-base-image-tag: ${{ steps.load-mcp-server-base-image.outputs.image-tag }}

      - name: Run all non-quickstart E2E tests
        id: e2e
        continue-on-error: true
        uses: ./.github/actions/run-e2e-tests
        with:
          # Merge queue / on-demand label runs cover chromium only. The nightly
          # schedule (and manual workflow_dispatch) add firefox + webkit, which
          # only carry the @firefox/@webkit-tagged tests.
          projects: ${{ (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') && 'api --project=chromium --project=firefox --project=webkit --project=identity-providers --project=vault-k8s' || 'api --project=chromium --project=identity-providers --project=vault-k8s' }}
          shard: "--shard=${{ matrix.shard }}/2"
          extra_args: "--grep-invert '@quickstart'"
          timeout: "20"

      - name: Upload blob report
        if: ${{ !cancelled() }}
        uses: ./.github/actions/github-upload-artifact
        with:
          name: blob-report-shard-${{ matrix.shard }}
          path: platform/e2e-tests/blob-report/
          retention-days: 1

      - name: Show logs on failure or flaky tests
        if: steps.setup-platform.outcome == 'failure' || steps.e2e.outcome == 'failure' || steps.e2e.outputs.has_flaky_tests == 'true'
        run: |
          echo "=== Kubernetes Pods ==="
          kubectl get pods -o wide || true

          echo "=== Kubernetes Services ==="
          kubectl get services || true

          echo "=== Archestra Platform Logs (main container) ==="
          kubectl logs -l app.kubernetes.io/name=archestra-platform -c archestra-platform --tail=200 2>/dev/null || true

          # The external-IdP validation logs (validateExternalIdpToken /
          # "JWKS JWT validation failed") fire mid-run, well before this dump,
          # so the --tail=200 above misses them. Grep the full backend log so a
          # flaky JWKS-gateway 401 can be traced to the branch that rejected
          # the token. --tail=-1 is required: with a label selector, kubectl
          # logs otherwise caps output at the last 10 lines.
          echo "=== External IdP validation (full-log grep) ==="
          kubectl logs -l app.kubernetes.io/name=archestra-platform \
            -c archestra-platform --tail=-1 2>/dev/null \
            | grep -iE 'validateExternalIdpToken|JWKS JWT validation failed|Invalid token for this profile' \
            || echo "(no external-IdP validation log found)"

          echo "=== Platform Init Container: vault-secrets ==="
          kubectl logs -l app.kubernetes.io/name=archestra-platform -c vault-secrets --tail=200 2>/dev/null || true

          echo "=== Platform Init Container: setup-postgres-extensions ==="
          kubectl logs -l app.kubernetes.io/name=archestra-platform -c setup-postgres-extensions --tail=200 2>/dev/null || true

          echo "=== Platform Init Container: wait-for-postgres ==="
          kubectl logs -l app.kubernetes.io/name=archestra-platform -c wait-for-postgres --tail=200 2>/dev/null || true

          echo "=== PostgreSQL Logs ==="
          kubectl logs -l app.kubernetes.io/name=postgresql --tail=200 || true

          echo "=== WireMock Logs ==="
          kubectl logs -l app=e2e-tests-wiremock --tail=200 2>/dev/null || true

          echo "=== Keycloak Logs ==="
          kubectl logs -l app.kubernetes.io/name=keycloak --tail=200 2>/dev/null || true

          echo "=== Vault Logs ==="
          kubectl logs -l app.kubernetes.io/name=vault --tail=200 2>/dev/null || true

          echo "=== MCP Example OAuth Server Logs ==="
          kubectl logs -l app.kubernetes.io/name=mcp-example-oauth --tail=200 2>/dev/null || true

          echo "=== Describe Platform Pod ==="
          kubectl describe pod -l app.kubernetes.io/name=archestra-platform || true

          echo "=== Describe PostgreSQL Pod ==="
          kubectl describe pod -l app.kubernetes.io/name=postgresql || true

          echo "=== PostgreSQL StatefulSet & PVCs ==="
          kubectl get statefulset,pvc -l app.kubernetes.io/name=postgresql -o wide || true

          echo "=== Recent Cluster Events ==="
          kubectl get events --sort-by=.lastTimestamp -A 2>/dev/null | tail -60 || true

      - name: Cleanup Kind cluster
        if: always()
        run: kind delete cluster --name archestra-ci-cluster || true

      - name: Fail if non-quickstart E2E tests failed
        if: ${{ always() && steps.e2e.outcome == 'failure' }}
        env:
          SHARD: ${{ matrix.shard }}
        run: |
          echo "The non-quickstart E2E run (shard ${SHARD}/2) failed."
          exit 1

  # Fan-in gate that carries the "Platform E2E Tests" required status check.
  # The sharded matrix above emits per-shard check names, which never match the
  # required context, so this job reproduces the exact name and is green only
  # when every shard succeeded. !cancelled() keeps it from being skipped — a
  # skipped required check stalls the merge queue just like a missing one.
  platform-e2e-tests:
    name: Platform E2E Tests
    needs: [platform-e2e-tests-shards]
    if: ${{ !cancelled() && (github.event_name == 'workflow_dispatch' || github.event_name == 'schedule' || github.event_name == 'merge_group' || github.event.label.name == 'run-e2e') }}
    runs-on: ubuntu-latest
    steps:
      - name: Check shard results
        env:
          SHARDS_RESULT: ${{ needs.platform-e2e-tests-shards.result }}
        run: |
          echo "Aggregated shard result: ${SHARDS_RESULT}"
          if [ "${SHARDS_RESULT}" != "success" ]; then
            echo "One or more non-quickstart E2E shards did not succeed."
            exit 1
          fi
          echo "All non-quickstart E2E shards passed."

  platform-readonly-vault-e2e-tests-placeholder:
    name: Platform E2E Tests (Readonly Vault)
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'pull_request' && (github.event.action != 'labeled' || github.event.label.name != 'run-e2e') }}
    steps:
      - name: Skip readonly-vault E2E on ordinary PR updates
        run: echo "Readonly-vault E2E runs on merge queue or when the run-e2e label is added."

  # Dedicated readonly-vault coverage. These tests need BYOS/readonly-vault runtime
  # behavior, which conflicts with the generic suite's manual secret entry flows.
  platform-readonly-vault-e2e-tests:
    name: Platform E2E Tests (Readonly Vault)
    needs: [platform-e2e-build]
    if: ${{ github.event_name == 'workflow_dispatch' || github.event_name == 'schedule' || github.event_name == 'merge_group' || github.event.label.name == 'run-e2e' }}
    runs-on: blacksmith-8vcpu-ubuntu-2404
    timeout-minutes: 30
    permissions:
      contents: read # Required to checkout the repository and read test assets.
      id-token: write # Required for Workload Identity Federation in setup actions.
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Setup environment
        uses: ./.github/actions/setup-env
        with:
          working-directory: ./platform

      - name: Load platform image
        id: load-platform-image
        uses: ./.github/actions/load-platform-image
        with:
          source: ${{ (github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == true) && 'artifact' || 'registry' }}
          image-tag: ${{ (github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == true) && format('archestra-platform:{0}', github.sha) || format('{0}/{1}:{2}', env.PLATFORM_IMAGE_REGISTRY, env.PLATFORM_IMAGE_NAME, github.sha) }}

      - name: Load MCP server base image
        id: load-mcp-server-base-image
        uses: ./.github/actions/load-mcp-server-base-image
        with:
          source: ${{ (github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == true) && 'artifact' || 'registry' }}
          image-tag: ${{ (github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == true) && format('mcp-server-base:{0}', github.sha) || format('{0}/{1}:{2}', env.MCP_SERVER_BASE_IMAGE_REGISTRY, env.MCP_SERVER_BASE_IMAGE_NAME, github.sha) }}

      - name: Setup Archestra Platform
        id: setup-platform
        uses: ./.github/actions/setup-archestra-platform
        with:
          kind-config-path: .github/kind.yaml
          kind-cluster-name: archestra-ci-cluster
          helm-values-path: .github/values-ci.yaml
          deploy-e2e-dependencies: "true"
          e2e-dependencies-install-mode: "foreground"
          e2e-dependencies-extra-helm-set: "vault.k8sAuth.enabled=true,vault.k8sAuth.boundServiceAccountName=archestra-platform,vault.k8sAuth.boundServiceAccountNamespace=default,vault.secrets[0].path=secret/data/archestra/config,vault.secrets[0].data.dburl=postgresql://archestra:vault_e2e_custom_pw@archestra-platform-postgresql:5432/archestra_dev,vault.secrets[0].data.dummy_var=hello-from-vault"
          e2e-dependencies-wait-for-vault: "true"
          build-platform-image: "false"
          platform-image-tag: ${{ steps.load-platform-image.outputs.image-tag }}
          platform-context: ./platform
          mcp-server-base-image-tag: ${{ steps.load-mcp-server-base-image.outputs.image-tag }}
          extra-helm-set: "archestra.env.ARCHESTRA_SECRETS_MANAGER=READONLY_VAULT,archestra.env.ARCHESTRA_HASHICORP_VAULT_KV_VERSION=2,archestra.initContainers.vaultSecrets.secrets[0].path=secret/data/archestra/config,archestra.initContainers.vaultSecrets.secrets[1].path=secret/data/archestra/config"

      - name: Run readonly-vault E2E tests
        id: e2e
        continue-on-error: true
        uses: ./.github/actions/run-e2e-tests
        with:
          projects: credentials-with-vault
          timeout: "20"

      - name: Upload blob report
        if: ${{ !cancelled() }}
        uses: ./.github/actions/github-upload-artifact
        with:
          name: blob-report-readonly-vault
          path: platform/e2e-tests/blob-report/
          retention-days: 1

      - name: Show logs on failure or flaky tests
        if: steps.setup-platform.outcome == 'failure' || steps.e2e.outcome == 'failure' || steps.e2e.outputs.has_flaky_tests == 'true'
        run: |
          echo "=== Kubernetes Pods ==="
          kubectl get pods -o wide || true

          echo "=== Kubernetes Services ==="
          kubectl get services || true

          echo "=== Archestra Platform Logs (main container) ==="
          kubectl logs -l app.kubernetes.io/name=archestra-platform -c archestra-platform --tail=200 2>/dev/null || true

          # The external-IdP validation logs (validateExternalIdpToken /
          # "JWKS JWT validation failed") fire mid-run, well before this dump,
          # so the --tail=200 above misses them. Grep the full backend log so a
          # flaky JWKS-gateway 401 can be traced to the branch that rejected
          # the token. --tail=-1 is required: with a label selector, kubectl
          # logs otherwise caps output at the last 10 lines.
          echo "=== External IdP validation (full-log grep) ==="
          kubectl logs -l app.kubernetes.io/name=archestra-platform \
            -c archestra-platform --tail=-1 2>/dev/null \
            | grep -iE 'validateExternalIdpToken|JWKS JWT validation failed|Invalid token for this profile' \
            || echo "(no external-IdP validation log found)"

          echo "=== Platform Init Container: vault-secrets ==="
          kubectl logs -l app.kubernetes.io/name=archestra-platform -c vault-secrets --tail=200 2>/dev/null || true

          echo "=== Platform Init Container: setup-postgres-extensions ==="
          kubectl logs -l app.kubernetes.io/name=archestra-platform -c setup-postgres-extensions --tail=200 2>/dev/null || true

          echo "=== Platform Init Container: wait-for-postgres ==="
          kubectl logs -l app.kubernetes.io/name=archestra-platform -c wait-for-postgres --tail=200 2>/dev/null || true

          echo "=== PostgreSQL Logs ==="
          kubectl logs -l app.kubernetes.io/name=postgresql --tail=200 || true

          echo "=== WireMock Logs ==="
          kubectl logs -l app=e2e-tests-wiremock --tail=200 2>/dev/null || true

          echo "=== Keycloak Logs ==="
          kubectl logs -l app.kubernetes.io/name=keycloak --tail=200 2>/dev/null || true

          echo "=== Vault Logs ==="
          kubectl logs -l app.kubernetes.io/name=vault --tail=200 2>/dev/null || true

          echo "=== MCP Example OAuth Server Logs ==="
          kubectl logs -l app.kubernetes.io/name=mcp-example-oauth --tail=200 2>/dev/null || true

          echo "=== Describe Platform Pod ==="
          kubectl describe pod -l app.kubernetes.io/name=archestra-platform || true

          echo "=== Describe PostgreSQL Pod ==="
          kubectl describe pod -l app.kubernetes.io/name=postgresql || true

          echo "=== PostgreSQL StatefulSet & PVCs ==="
          kubectl get statefulset,pvc -l app.kubernetes.io/name=postgresql -o wide || true

          echo "=== Recent Cluster Events ==="
          kubectl get events --sort-by=.lastTimestamp -A 2>/dev/null | tail -60 || true

      - name: Cleanup Kind cluster
        if: always()
        run: kind delete cluster --name archestra-ci-cluster || true

      - name: Fail if readonly-vault E2E tests failed
        if: ${{ always() && steps.e2e.outcome == 'failure' }}
        run: |
          echo "The readonly-vault E2E run failed."
          exit 1

  # Quickstart E2E tests - validates docker run quickstart instructions work correctly
  # Runs the mcp-install.spec.ts test against the platform started via docker run
  platform-quickstart-e2e-tests-placeholder:
    name: Platform E2E Tests (Quickstart)
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'pull_request' && (github.event.action != 'labeled' || github.event.label.name != 'run-e2e') }}
    steps:
      - name: Skip quickstart E2E on ordinary PR updates
        run: echo "Quickstart E2E runs on merge queue or when the run-e2e label is added."

  platform-quickstart-e2e-tests:
    name: Platform E2E Tests (Quickstart)
    needs: [platform-e2e-build]
    if: ${{ github.event_name == 'workflow_dispatch' || github.event_name == 'schedule' || github.event_name == 'merge_group' || github.event.label.name == 'run-e2e' }}
    runs-on: blacksmith-8vcpu-ubuntu-2404
    timeout-minutes: 30
    permissions:
      contents: read # Required to checkout the repository and read test assets.
      id-token: write # Required for Workload Identity Federation in setup actions.
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Setup environment
        uses: ./.github/actions/setup-env
        with:
          working-directory: ./platform

      - name: Load platform image
        id: load-platform-image
        uses: ./.github/actions/load-platform-image
        with:
          source: ${{ (github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == true) && 'artifact' || 'registry' }}
          image-tag: ${{ (github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == true) && format('archestra-platform:{0}', github.sha) || format('{0}/{1}:{2}', env.PLATFORM_IMAGE_REGISTRY, env.PLATFORM_IMAGE_NAME, github.sha) }}

      # Note: We intentionally don't load/use a custom MCP server base image for quickstart tests.
      # The embedded Kind cluster inside the quickstart container cannot easily access images
      # loaded on the host Docker daemon. The regular e2e tests (platform-e2e-tests) already
      # validate the MCP server base image with proper Kind image loading.
      # Quickstart tests use the default public MCP server base image.

      - name: Start WireMock for LLM provider mocking
        env:
          E2E_MAPPINGS_DIR: ${{ github.workspace }}/platform/helm/e2e-tests/mappings
        run: |
          # Create a shared Docker network so the quickstart container can reach WireMock by name
          docker network create archestra-quickstart-net || true

          # Start WireMock with the same mappings used in regular e2e tests
          docker run -d \
            --name archestra-wiremock \
            --network archestra-quickstart-net \
            -p 9092:8080 \
            -v "${E2E_MAPPINGS_DIR}:/home/wiremock/mappings:ro" \
            wiremock/wiremock:3.13.1 \
            --global-response-templating --disable-gzip --verbose

          # Wait for WireMock to be ready
          for i in {1..15}; do
            if curl -sf http://127.0.0.1:9092/__admin/health > /dev/null 2>&1; then
              echo "WireMock is ready!"
              break
            fi
            echo "Waiting for WireMock... (attempt $i/15)"
            sleep 1
          done

      - name: Start platform in quickstart mode
        env:
          PLATFORM_IMAGE_TAG: ${{ steps.load-platform-image.outputs.image-tag }}
        run: |
          echo "Starting Archestra platform in quickstart mode..."

          # Create named volumes for data persistence
          docker volume create archestra-ci-postgres-data || true
          docker volume create archestra-ci-app-data || true

          # Start the platform container
          # Note: Uses the public MCP server base image with 'latest' tag because:
          # 1. The embedded Kind cluster cannot easily access images loaded on the host Docker daemon
          # 2. Release-please bumps the version in config.ts before the image is published,
          #    causing failures when running on release PRs (the new version doesn't exist yet)
          # Using 'latest' ensures the image is always available regardless of version bumps
          #
          # supply-chain-policy: allow-latest quickstart needs a published public fallback
          # Provider base URLs point to WireMock so quickstart tests can mock LLM responses
          docker run -d \
            --name archestra-quickstart \
            --network archestra-quickstart-net \
            -p 127.0.0.1:9000:9000 \
            -p 127.0.0.1:3000:3000 \
            -e ARCHESTRA_QUICKSTART=true \
            -e ARCHESTRA_ORCHESTRATOR_MCP_SERVER_BASE_IMAGE=europe-west1-docker.pkg.dev/friendly-path-465518-r6/archestra-public/mcp-server-base:latest \
            -e ARCHESTRA_OPENAI_BASE_URL=http://archestra-wiremock:8080/v1 \
            -e ARCHESTRA_ANTHROPIC_BASE_URL=http://archestra-wiremock:8080 \
            -e ARCHESTRA_GEMINI_BASE_URL=http://archestra-wiremock:8080 \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v archestra-ci-postgres-data:/var/lib/postgresql/data \
            -v archestra-ci-app-data:/app/data \
            "${PLATFORM_IMAGE_TAG}"

          echo "Container started, waiting for platform to be ready..."

      - name: Wait for platform to be healthy
        run: |
          echo "Waiting for platform services to be healthy..."

          # Wait for backend health endpoint (max 3 minutes)
          # Use 127.0.0.1 instead of localhost to avoid IPv6 issues with Docker port mapping
          echo "Checking backend health..."
          for i in {1..90}; do
            if curl -sf http://127.0.0.1:9000/health > /dev/null 2>&1; then
              echo "Backend is healthy!"
              break
            fi
            echo "Waiting for backend... (attempt $i/90)"
            sleep 2
          done

          # Verify backend is accessible
          if ! curl -sf http://127.0.0.1:9000/health; then
            echo "Backend health check failed after 3 minutes"
            docker logs archestra-quickstart --tail=200
            exit 1
          fi

          # Wait for frontend (max 1 minute - should be quick after backend is ready)
          echo "Checking frontend health..."
          for i in {1..30}; do
            if curl -sf http://127.0.0.1:3000/ > /dev/null 2>&1; then
              echo "Frontend is healthy!"
              break
            fi
            echo "Waiting for frontend... (attempt $i/30)"
            sleep 2
          done

          # Verify frontend is accessible
          if ! curl -sf http://127.0.0.1:3000/; then
            echo "Frontend health check failed after 1 minute"
            docker logs archestra-quickstart --tail=200
            exit 1
          fi

          echo "All services are ready!"

      # Assert the embedded Dagger Engine (skill sandbox / code runtime) actually
      # came up. The entrypoint deploys it and gates on readiness, but that gate
      # is non-fatal: on timeout it disables the runtime and the container still
      # boots healthy — so the rest of the quickstart suite would pass even with a
      # broken sandbox. This step makes a dead engine a hard failure.
      - name: Assert embedded Dagger Engine is live
        run: |
          KUBECONFIG_PATH=/app/data/.kubeconfig

          echo "Waiting for the Dagger Engine statefulset to be Ready..."
          if ! docker exec archestra-quickstart \
              kubectl --kubeconfig "${KUBECONFIG_PATH}" rollout status \
              statefulset/dagger-runtime-engine -n default --timeout=120s; then
            echo "FAILED: Dagger Engine statefulset did not become Ready"
            docker exec archestra-quickstart kubectl --kubeconfig "${KUBECONFIG_PATH}" get pods -n default -o wide || true
            docker exec archestra-quickstart kubectl --kubeconfig "${KUBECONFIG_PATH}" describe statefulset/dagger-runtime-engine -n default || true
            docker exec archestra-quickstart kubectl --kubeconfig "${KUBECONFIG_PATH}" get events -n default --sort-by=.lastTimestamp 2>/dev/null | tail -40 || true
            docker logs archestra-quickstart --tail=200 2>&1 || true
            exit 1
          fi

          # rollout status only proves the pod is Ready. The entrypoint's own gate
          # is 60s; if it timed out there but the pod became Ready a few seconds
          # later, the backend env exports never ran and the runtime stays OFF for
          # users even though the pod is up. The success log line is the authoritative
          # signal that the feature actually flipped on.
          # Match against the captured logs with shell pattern matching rather
          # than `docker logs | grep -q`: under Actions' default `bash -o pipefail`
          # a `grep -q` that exits early can SIGPIPE the producer and fail the
          # whole pipeline, spuriously reporting the confirmation as missing.
          echo "Verifying the entrypoint enabled the code runtime..."
          LOGS=$(docker logs archestra-quickstart 2>&1)
          if [[ "${LOGS}" == *"code runtime stays disabled"* ]]; then
            echo "FAILED: entrypoint reported the Dagger Engine did not become ready in time"
            exit 1
          fi
          if [[ "${LOGS}" != *"Dagger Engine ready - code runtime enabled"* ]]; then
            echo "FAILED: did not find the code-runtime-enabled confirmation in container logs"
            exit 1
          fi
          echo "Dagger Engine is live and the code runtime is enabled."

      - name: Create e2e test env file
        run: |
          # Use 127.0.0.1 instead of localhost to avoid IPv6 issues with Docker
          echo "E2E_UI_BASE_URL=http://127.0.0.1:3000" > /tmp/quickstart-e2e.env
          echo "E2E_API_BASE_URL=http://127.0.0.1:9000" >> /tmp/quickstart-e2e.env
          echo "E2E_WIREMOCK_BASE_URL=http://127.0.0.1:9092" >> /tmp/quickstart-e2e.env
          cat /tmp/quickstart-e2e.env

      - name: Run quickstart E2E tests
        id: e2e
        uses: ./.github/actions/run-e2e-tests
        with:
          projects: quickstart
          # Run all tests tagged @quickstart: MCP install, auth origin, and first-time chat flow
          extra_args: "--grep '@quickstart'"
          env_file: /tmp/quickstart-e2e.env

      - name: Upload blob report
        if: ${{ !cancelled() }}
        uses: ./.github/actions/github-upload-artifact
        with:
          name: blob-report-quickstart
          path: platform/e2e-tests/blob-report/
          retention-days: 1

      - name: Show platform logs on failure
        if: failure()
        run: |
          echo "=== Archestra Quickstart Container Logs ==="
          docker logs archestra-quickstart --tail=500 2>&1 || echo "Could not get container logs"

          echo "=== WireMock Container Logs ==="
          docker logs archestra-wiremock --tail=200 2>&1 || echo "Could not get WireMock logs"

          echo "=== Docker Container Status ==="
          docker ps -a

          echo "=== Docker Volumes ==="
          docker volume ls

      - name: Cleanup
        if: always()
        run: |
          docker stop archestra-quickstart archestra-wiremock 2>/dev/null || true
          docker rm archestra-quickstart archestra-wiremock 2>/dev/null || true
          docker network rm archestra-quickstart-net 2>/dev/null || true
          docker volume rm archestra-ci-postgres-data 2>/dev/null || true
          docker volume rm archestra-ci-app-data 2>/dev/null || true

  # Merge all Playwright reports into a single HTML report
  platform-e2e-merge-reports-placeholder:
    name: Merge E2E Test Reports
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'pull_request' && (github.event.action != 'labeled' || github.event.label.name != 'run-e2e') }}
    steps:
      - name: Skip report merge on ordinary PR updates
        run: echo "Merged E2E reports are generated on merge queue or when the run-e2e label is added."

  platform-e2e-merge-reports:
    name: Merge E2E Test Reports
    needs: [platform-e2e-tests-shards, platform-readonly-vault-e2e-tests, platform-quickstart-e2e-tests]
    if: ${{ !cancelled() && (github.event_name == 'workflow_dispatch' || github.event_name == 'schedule' || github.event_name == 'merge_group' || github.event.label.name == 'run-e2e') }}
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 15
    permissions:
      contents: read # Required to checkout the repository and merge Playwright reports.
      pull-requests: write # Required for playwright-report-summary to comment on PRs.
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Setup environment
        uses: ./.github/actions/setup-env
        with:
          working-directory: ./platform

      - name: Download all blob reports
        uses: ./.github/actions/github-download-artifact
        with:
          path: platform/e2e-tests/blob-reports
          pattern: blob-report-*
          merge-multiple: true

      - name: Merge reports
        working-directory: ./platform/e2e-tests
        env:
          PLAYWRIGHT_JSON_OUTPUT_NAME: results.json
        run: |
          echo "=== Contents of blob-reports directory ==="
          ls -la ./blob-reports/ || echo "blob-reports directory not found"
          echo "=== Merging reports ==="
          pnpm exec playwright merge-reports --reporter=html,json ./blob-reports
          echo "=== Files created after merge ==="
          ls -la
          ls -la ./playwright-report/ || echo "playwright-report directory not created"

      - name: Upload merged Playwright report
        if: always()
        uses: ./.github/actions/github-upload-artifact
        with:
          name: playwright-report
          path: platform/e2e-tests/playwright-report/
          # Shorter retention for success, full retention for failures
          retention-days: ${{ (needs.platform-e2e-tests-shards.result == 'success' && needs.platform-quickstart-e2e-tests.result == 'success') && 7 || 30 }}

      - name: Write test summary
        if: always()
        uses: daun/playwright-report-summary@8bb85779022480a59ed8d33d9a4b8bda1c67666b # v4.0.0
        with:
          report-file: platform/e2e-tests/results.json
          job-summary: true
