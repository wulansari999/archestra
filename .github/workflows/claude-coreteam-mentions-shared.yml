name: Claude Core Team Mentions (Shared)

on:
  workflow_call:
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN:
        required: true

permissions: {}

concurrency:
  group: claude-coreteam-mentions-shared-${{ github.event.pull_request.number || github.event.issue.number || github.ref }}
  cancel-in-progress: true

jobs:
  claude-code:
    name: Claude Code
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 60
    permissions:
      contents: write # Required for Claude to push follow-up commits when explicitly instructed.
      pull-requests: write # Required for Claude to leave and update PR comments.
      issues: write # Required for Claude to reply on issue threads.
      id-token: write # Required by the Claude action's GitHub-backed auth flow.
      actions: read # Required for Claude to read CI results on PRs.
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 10 # give Claude a bit more context
          persist-credentials: false

      - name: Setup environment
        uses: ./.github/actions/setup-env

      - name: Run Claude Code
        id: claude
        uses: ./.github/actions/run-claude
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          use_sticky_comment: "true"
          additional_permissions: |
            actions: read
          assignee_trigger: "claude-bot"
          allowed_tools: 'Bash(pnpm install),Bash(pnpm add:*),Bash(pnpm test),Bash(pnpm typecheck),Bash(pnpm codegen:*),Bash(pnpm prettier:*)'
          additional_claude_args: '--system-prompt "Keep responses concise and to the point. Avoid lengthy explanations unless specifically requested."'
