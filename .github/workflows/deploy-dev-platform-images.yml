name: Deploy Dev Platform Images

on:
  workflow_call:
    inputs:
      version:
        description: "Version tag for the Docker images"
        required: true
        type: string
    secrets:
      DEVELOPMENT_OAUTH_PROXY_RELEASER_GCP_SERVICE_ACCOUNT_NAME:
        required: false
      DEVELOPMENT_OAUTH_PROXY_RELEASER_GCP_WORKLOAD_IDENTITY_PROVIDER_IDENTIFIER:
        required: false
      PLATFORM_NEXTJS_SOURCE_MAP_SENTRY_AUTH_TOKEN:
        required: false
      TURBOREPO_REMOTE_CACHING_TOKEN:
        required: false
      TURBOREPO_REMOTE_CACHING_TEAM:
        required: false
  workflow_dispatch:
  pull_request:
    types:
      - labeled

permissions: {}

concurrency:
  group: deploy-dev-platform-images-${{ github.event.pull_request.number || inputs.version || github.ref }}
  cancel-in-progress: true

jobs:
  resolve-previous-platform-image:
    name: Resolve previous platform image
    if: ${{ github.event_name == 'workflow_call' || github.event_name == 'workflow_dispatch' || github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.label.name == 'deploy-dev-platform-images' && github.event.pull_request.head.repo.fork != true) }}
    runs-on: blacksmith-16vcpu-ubuntu-2404
    permissions:
      contents: read # Required to resolve the currently deployed platform image from staging.
      id-token: write # Required for Workload Identity Federation and GKE credential retrieval.
    outputs:
      previous_image: ${{ steps.previous-platform-image.outputs.previous-image }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Authenticate to Google Artifact Registry
        uses: ./.github/actions/auth-to-gar
        with:
          service_account: ${{ secrets.DEVELOPMENT_OAUTH_PROXY_RELEASER_GCP_SERVICE_ACCOUNT_NAME }}
          workload_identity_provider: ${{ secrets.DEVELOPMENT_OAUTH_PROXY_RELEASER_GCP_WORKLOAD_IDENTITY_PROVIDER_IDENTIFIER }}

      - name: Install gke-gcloud-auth-plugin
        run: gcloud components install gke-gcloud-auth-plugin

      - name: Configure kubectl
        run: |
          gcloud container clusters get-credentials archestra-staging \
            --zone us-central1-a --project friendly-path-465518-r6

      - name: Resolve previous platform image
        id: previous-platform-image
        run: |
          PREV_TAG=$(kubectl get deployment archestra-platform -n archestra \
            -o jsonpath='{.spec.template.spec.containers[0].image}' 2>/dev/null \
            | cut -d: -f2) || true

          if [ -n "$PREV_TAG" ] && [ "$PREV_TAG" != "$IMAGE_VERSION" ]; then
            echo "previous-image=europe-west1-docker.pkg.dev/friendly-path-465518-r6/archestra-public/platform:${PREV_TAG}" >> "$GITHUB_OUTPUT"
          else
            echo "previous-image=" >> "$GITHUB_OUTPUT"
          fi
        env:
          IMAGE_VERSION: ${{ inputs.version || (github.event_name == 'pull_request' && github.event.pull_request.head.sha) || github.sha }}

  publish-dev-platform-image:
    name: Build Platform Dev Docker Image
    needs:
      - resolve-previous-platform-image
    if: ${{ github.event_name == 'workflow_call' || github.event_name == 'workflow_dispatch' || github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.label.name == 'deploy-dev-platform-images' && github.event.pull_request.head.repo.fork != true) }}
    permissions:
      contents: read # Required to checkout the repository and build the image.
      id-token: write # Required for Workload Identity Federation when pushing images.
    uses: ./.github/workflows/build-native-multi-arch-image.yml
    with:
      image_directory: ./platform
      image_name: platform
      image_registry: europe-west1-docker.pkg.dev/friendly-path-465518-r6/archestra-public
      version: ${{ inputs.version || (github.event_name == 'pull_request' && github.event.pull_request.head.sha) || github.sha }}
      push_image: true
      auth_provider: gar
      checkout_ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
      previous_image: ${{ needs.resolve-previous-platform-image.outputs.previous_image }}
    secrets:
      GCP_SERVICE_ACCOUNT_NAME: ${{ secrets.DEVELOPMENT_OAUTH_PROXY_RELEASER_GCP_SERVICE_ACCOUNT_NAME }}
      GCP_WORKLOAD_IDENTITY_PROVIDER_IDENTIFIER: ${{ secrets.DEVELOPMENT_OAUTH_PROXY_RELEASER_GCP_WORKLOAD_IDENTITY_PROVIDER_IDENTIFIER }}
      PLATFORM_NEXTJS_SOURCE_MAP_SENTRY_AUTH_TOKEN: ${{ secrets.PLATFORM_NEXTJS_SOURCE_MAP_SENTRY_AUTH_TOKEN }}
      TURBOREPO_REMOTE_CACHING_TOKEN: ${{ secrets.TURBOREPO_REMOTE_CACHING_TOKEN }}
      TURBOREPO_REMOTE_CACHING_TEAM: ${{ secrets.TURBOREPO_REMOTE_CACHING_TEAM }}

  publish-dev-mcp-server-base-image:
    name: Build MCP Server Base Dev Image
    if: ${{ github.event_name == 'workflow_call' || github.event_name == 'workflow_dispatch' || github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.label.name == 'deploy-dev-platform-images' && github.event.pull_request.head.repo.fork != true) }}
    uses: ./.github/workflows/build-base-mcp-server-docker-image.yml
    permissions:
      contents: read # Required to invoke the reusable MCP server base image workflow.
      id-token: write # Required for Workload Identity Federation.
    with:
      push_to_gcr: true
      version: ${{ inputs.version || (github.event_name == 'pull_request' && github.event.pull_request.head.sha) || github.sha }}
    secrets:
      GCP_SERVICE_ACCOUNT_NAME: ${{ secrets.DEVELOPMENT_OAUTH_PROXY_RELEASER_GCP_SERVICE_ACCOUNT_NAME }}
      GCP_WORKLOAD_IDENTITY_PROVIDER_IDENTIFIER: ${{ secrets.DEVELOPMENT_OAUTH_PROXY_RELEASER_GCP_WORKLOAD_IDENTITY_PROVIDER_IDENTIFIER }}

  publish-dev-sandbox-base-image:
    name: Build Sandbox Base Dev Image
    if: ${{ github.event_name == 'workflow_call' || github.event_name == 'workflow_dispatch' || github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.label.name == 'deploy-dev-platform-images' && github.event.pull_request.head.repo.fork != true) }}
    uses: ./.github/workflows/build-sandbox-base-docker-image.yml
    permissions:
      contents: read # Required to invoke the reusable sandbox base image workflow.
      id-token: write # Required for Workload Identity Federation.
    with:
      push_to_gcr: true
      version: ${{ inputs.version || (github.event_name == 'pull_request' && github.event.pull_request.head.sha) || github.sha }}
    secrets:
      GCP_SERVICE_ACCOUNT_NAME: ${{ secrets.DEVELOPMENT_OAUTH_PROXY_RELEASER_GCP_SERVICE_ACCOUNT_NAME }}
      GCP_WORKLOAD_IDENTITY_PROVIDER_IDENTIFIER: ${{ secrets.DEVELOPMENT_OAUTH_PROXY_RELEASER_GCP_WORKLOAD_IDENTITY_PROVIDER_IDENTIFIER }}
