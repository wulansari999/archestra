name: On commits to main

on:
  push:
    branches:
      - main
    paths:
      - ".github/**"
      - "platform/**"
  # Allow manual triggering of the workflow
  workflow_dispatch:

# Set default permissions to empty to enforce least privilege
# Each job will explicitly declare the permissions it needs
permissions: {}

concurrency:
  group: on-commits-to-main-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy-dev-platform-images:
    name: Build Platform Staging and MCP Server Base Images
    uses: ./.github/workflows/deploy-dev-platform-images.yml
    permissions:
      contents: read # Required to invoke the reusable image publishing workflow.
      id-token: write # Required for Workload Identity Federation.
    with:
      version: ${{ github.sha }}
    secrets:
      DEVELOPMENT_OAUTH_PROXY_RELEASER_GCP_SERVICE_ACCOUNT_NAME: ${{ secrets.DEVELOPMENT_OAUTH_PROXY_RELEASER_GCP_SERVICE_ACCOUNT_NAME }}
      DEVELOPMENT_OAUTH_PROXY_RELEASER_GCP_WORKLOAD_IDENTITY_PROVIDER_IDENTIFIER: ${{ secrets.DEVELOPMENT_OAUTH_PROXY_RELEASER_GCP_WORKLOAD_IDENTITY_PROVIDER_IDENTIFIER }}
      PLATFORM_NEXTJS_SOURCE_MAP_SENTRY_AUTH_TOKEN: ${{ secrets.PLATFORM_NEXTJS_SOURCE_MAP_SENTRY_AUTH_TOKEN }}
      TURBOREPO_REMOTE_CACHING_TOKEN: ${{ secrets.TURBOREPO_REMOTE_CACHING_TOKEN }}
      TURBOREPO_REMOTE_CACHING_TEAM: ${{ secrets.TURBOREPO_REMOTE_CACHING_TEAM }}

  deploy-to-staging:
    name: Deploy to staging
    runs-on: blacksmith-2vcpu-ubuntu-2404
    needs: [deploy-dev-platform-images]
    permissions:
      contents: read # Required to checkout the repository and deploy the chart.
      id-token: write # Required for Workload Identity Federation.
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Authenticate to Google Cloud
        uses: ./.github/actions/google-auth
        with:
          service_account: ${{ secrets.DEVELOPMENT_OAUTH_PROXY_RELEASER_GCP_SERVICE_ACCOUNT_NAME }}
          workload_identity_provider: ${{ secrets.DEVELOPMENT_OAUTH_PROXY_RELEASER_GCP_WORKLOAD_IDENTITY_PROVIDER_IDENTIFIER }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3.0.1

      - name: Install gke-gcloud-auth-plugin
        run: |
          gcloud components install gke-gcloud-auth-plugin

      - name: Configure kubectl
        run: |
          gcloud container clusters get-credentials archestra-staging \
            --zone us-central1-a \
            --project friendly-path-465518-r6

      - name: Deploy to staging
        env:
          PLATFORM_IMAGE_TAG: ${{ github.sha }}
          ARCHESTRA_STAGING_METRICS_SECRET: ${{ secrets.ARCHESTRA_STAGING_METRICS_SECRET }}
          ARCHESTRA_STAGING_OTEL_EXPORTER_OTLP_ENDPOINT: ${{ secrets.ARCHESTRA_STAGING_OTEL_EXPORTER_OTLP_ENDPOINT }}
          ARCHESTRA_STAGING_AUTH_SECRET: ${{ secrets.ARCHESTRA_STAGING_AUTH_SECRET }}
          ARCHESTRA_STAGING_AUTH_ADMIN_EMAIL: ${{ secrets.ARCHESTRA_STAGING_AUTH_ADMIN_EMAIL }}
          ARCHESTRA_STAGING_AUTH_ADMIN_PASSWORD: ${{ secrets.ARCHESTRA_STAGING_AUTH_ADMIN_PASSWORD }}
          ARCHESTRA_STAGING_SENTRY_BACKEND_DSN: ${{ secrets.ARCHESTRA_STAGING_SENTRY_BACKEND_DSN }}
          ARCHESTRA_STAGING_SENTRY_FRONTEND_DSN: ${{ secrets.ARCHESTRA_STAGING_SENTRY_FRONTEND_DSN }}
          ARCHESTRA_STAGING_OUTLOOK_TENANT_ID: ${{ secrets.ARCHESTRA_STAGING_OUTLOOK_TENANT_ID }}
          ARCHESTRA_STAGING_OUTLOOK_CLIENT_ID: ${{ secrets.ARCHESTRA_STAGING_OUTLOOK_CLIENT_ID }}
          ARCHESTRA_STAGING_OUTLOOK_CLIENT_SECRET: ${{ secrets.ARCHESTRA_STAGING_OUTLOOK_CLIENT_SECRET }}
          ARCHESTRA_STAGING_CHAT_ANTHROPIC_API_KEY: ${{ secrets.ARCHESTRA_STAGING_CHAT_ANTHROPIC_API_KEY }}
        run: |
          helm upgrade archestra-platform \
            ./platform/helm/archestra \
            --install \
            --namespace archestra \
            --create-namespace \
            --set "archestra.image=europe-west1-docker.pkg.dev/friendly-path-465518-r6/archestra-public/platform:${PLATFORM_IMAGE_TAG}" \
            --set "archestra.env.ARCHESTRA_METRICS_SECRET=${ARCHESTRA_STAGING_METRICS_SECRET}" \
            --set "archestra.env.ARCHESTRA_OTEL_EXPORTER_OTLP_ENDPOINT=${ARCHESTRA_STAGING_OTEL_EXPORTER_OTLP_ENDPOINT}" \
            --set "archestra.env.ARCHESTRA_AUTH_SECRET=${ARCHESTRA_STAGING_AUTH_SECRET}" \
            --set "archestra.env.ARCHESTRA_AUTH_ADMIN_EMAIL=${ARCHESTRA_STAGING_AUTH_ADMIN_EMAIL}" \
            --set "archestra.env.ARCHESTRA_AUTH_ADMIN_PASSWORD=${ARCHESTRA_STAGING_AUTH_ADMIN_PASSWORD}" \
            --set "archestra.env.ARCHESTRA_SENTRY_BACKEND_DSN=${ARCHESTRA_STAGING_SENTRY_BACKEND_DSN}" \
            --set "archestra.env.ARCHESTRA_SENTRY_FRONTEND_DSN=${ARCHESTRA_STAGING_SENTRY_FRONTEND_DSN}" \
            --set "archestra.env.ARCHESTRA_AGENTS_INCOMING_EMAIL_OUTLOOK_TENANT_ID=${ARCHESTRA_STAGING_OUTLOOK_TENANT_ID}" \
            --set "archestra.env.ARCHESTRA_AGENTS_INCOMING_EMAIL_OUTLOOK_CLIENT_ID=${ARCHESTRA_STAGING_OUTLOOK_CLIENT_ID}" \
            --set "archestra.env.ARCHESTRA_AGENTS_INCOMING_EMAIL_OUTLOOK_CLIENT_SECRET=${ARCHESTRA_STAGING_OUTLOOK_CLIENT_SECRET}" \
            --set "archestra.env.ARCHESTRA_CHAT_ANTHROPIC_API_KEY=${ARCHESTRA_STAGING_CHAT_ANTHROPIC_API_KEY}" \
            --values .github/values-staging.yaml \
            --wait \
            --timeout 15m
